<!DOCTYPE html>
<html>
<head>
    <script>if ('scrollRestoration' in history) history.scrollRestoration = 'manual';</script>
    <title>CoC Bot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <div class="instance_tag">
            <a href="/" style="text-decoration:none; color:inherit;">
                <strong class="instance_id" id="instance_id">{{ id }}</strong>
            </a>
        </div>

        <img src="{{ url_for('static', filename='coc_bot_logo.png') }}" alt="CoC Bot">

        <h1 class="themed_text">CoC Bot</h1>

    </header>

    <div class="container">

        <div style="margin-bottom:25px;">
            <p>
                <span class="themed_padding" id="left_padding"></span><!--
            --><strong class="themed_text" id="countdown_title"></strong><!--
            --><span class="themed_text" id="countdown_time"></span><!--
            --><span class="themed_padding" id="right_padding">.</span>
            </p>
            <strong class="themed_text" id="run_status" style="font-size:1.5em; padding:0;"></strong>
        </div>

        <!-- Bot Script Process Controller -->
        <div class="notifications" style="margin-bottom: 25px; border-color: var(--accent);">
            <h1 class="notifications_title" style="background-color: rgba(124, 58, 237, 0.15);"><i class="fas fa-robot"></i> Bot Steuerung</h1>
            <div style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span class="themed_text" style="font-size: 1.4em;">Status:</span>
                    <span id="bot-process-status" class="themed_text" style="font-size: 1.4em; font-weight: bold; color: var(--danger);"><i class="fas fa-circle-notch fa-spin"></i> Pruefe...</span>
                </div>
                <button type="button" id="bot-control-btn" onclick="toggleBotProcess()" class="btn" style="width: 100%; font-size: 1.6em; padding: 12px; background-color: var(--accent); border-radius: 12px; border: none; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px var(--shadow);">
                    Bot starten
                </button>
            </div>
        </div>

        <form method="POST" class="stacked-buttons">
            <button type="submit" name="time" value="5">5 min</button>
            <button type="submit" name="time" value="15">15 min</button>
            <button type="submit" name="time" value="30">30 min</button>
        </form>

        <form method="POST" class="custom-input-form">
            <input type="number" name="custom_time" placeholder="Custom" min="1" required title="Minutes">
            <button type="submit" name="custom_time"><i class="fas fa-arrow-right"></i></button>
        </form>

        <form method="POST" class="cancel-button">
            <button type="submit" name="time" value="0">Cancel</button>
        </form>

        <!-- Live View Section -->
        <div id="live-view-panel" class="notifications" style="margin-top:30px;">
            <h1 class="notifications_title">Live Screen (Interaktiv)</h1>
            <div style="padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="live-view-checkbox" onchange="toggleLiveView(this.checked)" style="width: 25px; height: 25px; cursor: pointer;">
                    <span class="themed_text" style="font-size: 1.5em; font-weight: bold;">Live-Übertragung aktivieren</span>
                </div>
                
                <div style="width: 100%; text-align: center; position: relative;">
                    <img id="live-screen-img" src="" alt="Warte auf Screenshot..." onclick="sendRemoteClick(event)" style="display: none; max-width: 100%; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: crosshair;">
                    <div id="live-screen-placeholder" class="themed_text" style="padding: 30px; font-size: 1.8em; opacity: 0.6;">
                        <i class="fas fa-desktop" style="font-size: 1.5em; margin-bottom: 10px; display: block;"></i>
                        Deaktiviert (Checkbox aktivieren zum Laden)
                    </div>
                </div>

                <!-- Remote input controls (hidden when live screen is disabled) -->
                <div id="remote-controls" style="display: none; width: 100%; flex-direction: column; gap: 10px;">
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="remote-text-input" placeholder="Text an Gerät senden..." style="flex: 1; padding: 12px; font-size: 1.4em; border-radius: 12px; border: 1px solid var(--card-border); background: rgba(255,255,255,0.05); color: var(--text);">
                        <button type="button" onclick="sendRemoteType()" style="padding: 12px 20px; font-size: 1.4em; border-radius: 12px; border: none; background-color: var(--accent); color: white; cursor: pointer; font-weight: bold;">Senden</button>
                    </div>
                    <div style="display: flex; gap: 8px; justify-content: center; width: 100%;">
                        <button type="button" onclick="sendRemoteKey(67)" style="flex: 1; padding: 10px; font-size: 1.2em; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer;"><i class="fas fa-backspace"></i> Backspace</button>
                        <button type="button" onclick="sendRemoteKey(66)" style="flex: 1; padding: 10px; font-size: 1.2em; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer;"><i class="fas fa-keyboard"></i> Enter</button>
                        <button type="button" onclick="sendRemoteKey(3)" style="flex: 1; padding: 10px; font-size: 1.2em; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: var(--text); cursor: pointer;"><i class="fas fa-home"></i> Home</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Live Console Logs Section -->
        <div id="live-console-panel" class="exclusions" style="margin-top:30px; border-color: rgba(255,255,255,0.05);">
            <h1 class="exclusions_title" style="background-color: rgba(0,0,0,0.15);"><i class="fas fa-terminal"></i> Bot Konsole</h1>
            <div style="padding: 15px;">
                <textarea id="bot-console-log" readonly style="width: 100%; height: 180px; font-family: 'Courier New', monospace; font-size: 11px; background: #05070c; color: #10b981; border: 1px solid var(--card-border); border-radius: 12px; padding: 12px; resize: none; outline: none; box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);"></textarea>
            </div>
        </div>

        <div id="notifications" class="notifications" style="margin-top:30px;">
            <h1 class="notifications_title">Recent Notifications</h1>
        </div>

        <div id="exclusions" class="exclusions" style="margin-top:30px;">
            <h1 class="exclusions_title">Task Settings</h1>
            <form method="POST" class="exclusions-form"></form>
        </div>
        
        <script>
            document.body.addEventListener("touchstart", () => {}, false);

            document.addEventListener("visibilitychange", () => {
                if (!document.hidden) {
                    document.querySelector('link[rel="icon"]').href="{{ url_for('static', filename='favicon.png') }}";
                }
            });
        </script>

        {% if id and end_time is number and current_time is number %}
        <script>
            const id = "{{ id }}";
            let start = Date.now();
            let current_time = {{ current_time }};
            let end_time = {{ end_time }};
            let run_status = {{ run_status | tojson }};
            let notifications = {{ notifications | tojson }};
            let exclusions = {{ exclusions | tojson }};
            const time_labels = ['d', 'h', 'm', 's'];

            const exclusion_options = new Map()
            // Home Base
            exclusion_options.set("Home Base Priority", ["Will upgrade according to priority", "Will upgrade randomly"]);
            exclusion_options.set("Home Base", ["Home base building upgrades ENABLED", "Home base building upgrades DISABLED"]);
            exclusion_options.set("Heroes", ["Hero upgrades ENABLED", "Hero upgrades DISABLED"]);
            exclusion_options.set("Builder Apprentice", ["Builder apprentice assignment ENABLED", "Builder apprentice assignment DISABLED"]);
            exclusion_options.set("Home Lab Priority", ["Will upgrade according to priority", "Will upgrade randomly"]);
            exclusion_options.set("Home Lab", ["Home lab upgrades ENABLED", "Home lab upgrades DISABLED"]);
            exclusion_options.set("Lab Assistant", ["Lab assistant assignment ENABLED", "Lab assistant assignment DISABLED"]);
            // Builder Base
            exclusion_options.set("Builder Base Priority", ["Will upgrade according to priority", "Will upgrade randomly"]);
            exclusion_options.set("Builder Base", ["Builder base building upgrades ENABLED", "Builder base building upgrades DISABLED"]);
            exclusion_options.set("Builder Lab Priority", ["Will upgrade according to priority", "Will upgrade randomly"]);
            exclusion_options.set("Builder Lab", ["Builder lab upgrades ENABLED", "Builder lab upgrades DISABLED"]);
            exclusion_options.set("Home Attacks", ["Home attacks ENABLED", "Home attacks DISABLED"]);
            exclusion_options.set("Builder Attacks", ["Builder attacks ENABLED", "Builder attacks DISABLED"]);

            async function fetchExclusions() {
                try {
                    const response = await fetch(`/${id}/exclude`);
                    const data = await response.json();
                    exclusions = data.exclusions;
                } catch (error) {
                    console.error('Error fetching exclusions:', error);
                }
            }

            async function fetchNotifications() {
                try {
                    const response = await fetch(`/${id}/notifications`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify(3),
                    });
                    const data = await response.json();
                    const latest_notif = (notifications.length > 0) ? notifications[0].time_stamp : 0;
                    notifications = data;

                    if (data.length > 0 && data[0].time_stamp > latest_notif && document.visibilityState === "hidden") {
                        document.querySelector('link[rel="icon"]').href = "{{ url_for('static', filename='favicon_alert.png') }}";
                    }
                } catch (error) {
                    console.error('Error fetching notifications:', error);
                }
            }

            async function fetchCurrentTime() {
                try {
                    const response = await fetch(`/current_time`);
                    const data = await response.json();
                    current_time = data.current_time;
                    start = Date.now();
                } catch (error) {
                    console.error('Error fetching current time:', error);
                }
            }

            async function fetchEndTime() {
                try {
                    const response = await fetch(`/${id}/end_time`);
                    const data = await response.json();
                    end_time = data.end_time;
                } catch (error) {
                    console.error('Error fetching countdown end time:', error);
                }
            }

            async function fetchStatus() {
                try {
                    const response = await fetch(`/${id}/status`);
                    const data = await response.json();
                    run_status = data.status;
                } catch (error) {
                    console.error('Error fetching status:', error);
                }
            }

            async function setEndTime(minutes) {
                try {
                    const response = await fetch(`/${id}/end_time`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            time: minutes
                        })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        end_time = data.end_time;
                    }
                } catch (error) {
                    console.error('Error setting end time:', error);
                }
            }

            async function setExclusion(item, action) {
                try {
                    const response = await fetch(`/${id}/exclude`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            action: action,
                            item: item
                        })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        exclusions = data.exclusions;
                    }
                } catch (error) {
                    console.error('Error updating exclusion:', error);
                }
            }

            function fetchAll() {
                fetchEndTime();
                fetchStatus();
                fetchNotifications();
                fetchExclusions();
            }

            setInterval(fetchAll, 1000);

            function get_hms(seconds) {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = Math.floor(seconds % 60);
                return {hours, minutes, seconds: secs};
            }

            function updateNotifications() {
                let currentIndex = 0;
                let sorted_notifications = [...notifications].sort((a, b) => b.time_stamp - a.time_stamp);
                while (currentIndex < sorted_notifications.length) {
                    const now = Date.now();

                    const notif = sorted_notifications[currentIndex];

                    const age = current_time - notif.time_stamp + (now - start) / 1000;
                    const days = Math.floor(age / 86400);
                    if (days > 7) {
                        currentIndex++;
                        continue;
                    }
                    const hours = Math.floor((age % 86400) / 3600);
                    const minutes = Math.floor((age % 3600) / 60);
                    const seconds = Math.floor(age % 60);
                    const time_array = [days, hours, minutes, seconds];
                    let time_index = 0;
                    while (time_index < time_array.length-1 && time_array[time_index]===0) {
                        time_index++;
                    }
                    const time_string = time_array[time_index] + time_labels[time_index];

                    if (document.getElementById(`notif_${currentIndex}`)) {
                        document.getElementById(`notif_${currentIndex}`).innerHTML = `
                        <div class="notif">
                            <div class="notif_data">${notif.data}</div>
                            <div class="notif_age">${time_string}</div>
                        </div>
                        `;
                    } else {
                        const notifDiv = document.createElement("div");
                        notifDiv.className = "notification";
                        notifDiv.id = `notif_${currentIndex}`;
                        notifDiv.innerHTML = `
                        <div class="notif">
                            <div class="notif_data">${notif.data}</div>
                            <div class="notif_age">${time_string}</div>
                        </div>
                        `;

                        document.getElementById("notifications").appendChild(notifDiv);
                    }

                    currentIndex++;
                }
            }
            
            function updateLastChecked() {
                const now = Date.now();
                let last_checked_string = "";
                if (typeof run_status === "number") {
                    const age = Math.max(0, current_time - run_status + (now - start) / 1000);
                    const days = Math.floor(age / 86400);
                    if (days < 7) {
                        const {hours, minutes, seconds} = get_hms(age);
                        const time_array = [days, hours, minutes, seconds];
                        let time_index = 0;
                        while (time_index < time_array.length-1 && time_array[time_index]===0) {
                            time_index++;
                        }
                        last_checked_string = `Checked ${time_array[time_index] + time_labels[time_index]} ago`;
                    }
                } else if (run_status == "now") {
                    last_checked_string = `Checking now`;
                } else if (run_status == "error") {
                    last_checked_string = ``;
                }
                document.getElementById('run_status').innerText = last_checked_string;
            }

            function updateCountdown() {
                const now = Date.now();
                const total_time_left = end_time - current_time;
                const time_left = Math.max(0, total_time_left - (now - start) / 1000);

                if (run_status == "error") {
                    document.getElementById('countdown_title').innerText = `Error!`;
                    document.getElementById('countdown_time').innerText = ``;
                    document.getElementById('left_padding').innerText = ``;
                    document.getElementById('right_padding').innerText = ``;
                } else if (time_left > 0) {
                    const {hours, minutes, seconds} = get_hms(time_left);
                    const time_array = [hours, minutes, seconds];
                    let time_index = 0;
                    while (time_index < time_array.length-2 && time_array[time_index] === 0) {
                        time_index++;
                    }
                    let time_string = "";
                    if (time_array[time_index] !== 0) {
                        time_string = `${time_array[time_index] + time_labels[time_index+1]} ${time_array[time_index+1] + time_labels[time_index+2]}`;
                    } else {
                        time_string = `${time_array[time_index+1] + time_labels[time_index+2]}`;
                    }

                    document.getElementById('countdown_title').innerText = `Paused:`;
                    document.getElementById('countdown_time').innerText = ` ${time_string}`;
                    document.getElementById('left_padding').innerText = ``;
                    document.getElementById('right_padding').innerText = ``;
                } else {
                    const num_dots = Math.floor((now / 500) % 4);
                    const dots = '.'.repeat(num_dots);
                    const padding_dots = '.'.repeat(3 - num_dots);

                    document.getElementById('countdown_title').innerText = `Running`;
                    document.getElementById('countdown_time').innerText = dots;
                    document.getElementById('left_padding').innerText = `...`;
                    document.getElementById('right_padding').innerText = padding_dots;
                }
            }

            function initExclusions() {
                const exclusion_form = document.querySelector(".exclusions-form");
                exclusion_options.forEach((option_desc, option_name) => {
                    let button = document.createElement("button");
                    button.className = "exclusion";
                    button.name = "exclude";
                    button.type = "submit";
                    let value = option_name.toLowerCase().replaceAll(" ", "_");
                    button.value = value;
                    button.innerText = option_name;
                    if (exclusions.includes(value)) {
                        button.classList.add("active");
                        button.title = option_desc[1];
                    } else {
                        button.classList.add("inactive");
                        button.title = option_desc[0];
                    }
                    exclusion_form.appendChild(button);
                });
            }

            function updateExclusions() {
                document.querySelectorAll(".exclusion").forEach(button => {
                    let name = button.value;
                    if (exclusions.includes(name)) {
                        button.classList.remove("inactive");
                        button.classList.add("active");
                        button.title = exclusion_options.get(button.innerText)[1];
                    } else {
                        button.classList.remove("active");
                        button.classList.add("inactive");
                        button.title = exclusion_options.get(button.innerText)[0];
                    }
                });
            }

            function updateAll() {
                updateCountdown();
                updateLastChecked();
                updateNotifications();
                updateExclusions();
                requestAnimationFrame(updateAll);
            }

            initExclusions();
            updateAll();

            document.addEventListener("keyup", (event) => {
                if (event.key === "Escape") window.location.href = "/";
            });

            document.querySelectorAll("form").forEach(form => {
                form.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    
                    const submitter = e.submitter;
                    const formData = new FormData(form);

                    if (submitter.name === "time") {
                        setEndTime(submitter.value);
                        fetchCurrentTime();
                    } else if (submitter.name === "custom_time") {
                        setEndTime(formData.get("custom_time"));
                        fetchCurrentTime();
                    } else if (submitter.name === "exclude") {
                        let action;
                        if (submitter.classList.contains("active")) {
                            submitter.classList.remove("active");
                            submitter.classList.add("inactive");
                            action = "remove";
                        } else {
                            submitter.classList.remove("inactive");
                            submitter.classList.add("active");
                            action = "add";
                        }
                        setExclusion(submitter.value, action);
                    }

                    form.reset();
                });
            });

            // Live screen view updates
            let liveViewInterval = null;
            function toggleLiveView(enabled) {
                const img = document.getElementById("live-screen-img");
                const placeholder = document.getElementById("live-screen-placeholder");
                const controls = document.getElementById("remote-controls");
                if (enabled) {
                    img.style.display = "inline-block";
                    placeholder.style.display = "none";
                    controls.style.display = "flex";
                    updateLiveView();
                    if (liveViewInterval) clearInterval(liveViewInterval);
                    liveViewInterval = setInterval(updateLiveView, 3000);
                } else {
                    img.style.display = "none";
                    placeholder.style.display = "block";
                    controls.style.display = "none";
                    if (liveViewInterval) {
                        clearInterval(liveViewInterval);
                        liveViewInterval = null;
                    }
                }
            }
            function updateLiveView() {
                const img = document.getElementById("live-screen-img");
                if (img.style.display !== "none") {
                    img.src = `/${id}/screenshot?t=` + Date.now();
                }
            }

            // Interactive Remote Control Handlers
            async function sendRemoteClick(event) {
                const img = event.target;
                const rect = img.getBoundingClientRect();
                
                // Calculate relative click coordinate between 0.0 and 1.0
                const x = (event.clientX - rect.left) / rect.width;
                const y = (event.clientY - rect.top) / rect.height;

                try {
                    await fetch(`/${id}/click`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ x, y })
                    });
                    // Refresh screen immediately to see result
                    setTimeout(updateLiveView, 500);
                } catch (err) {
                    console.error("Fehler beim Senden des Klicks:", err);
                }
            }

            async function sendRemoteType() {
                const input = document.getElementById("remote-text-input");
                const text = input.value;
                if (!text) return;

                try {
                    await fetch(`/${id}/type`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text })
                    });
                    input.value = "";
                    setTimeout(updateLiveView, 800);
                } catch (err) {
                    console.error("Fehler beim Senden des Texts:", err);
                }
            }

            async function sendRemoteKey(key) {
                try {
                    await fetch(`/${id}/keyevent`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ key })
                    });
                    setTimeout(updateLiveView, 500);
                } catch (err) {
                    console.error("Fehler beim Senden des Keyevents:", err);
                }
            }

            // Subprocess Control & Logs Polling
            let botIsRunning = false;
            
            async function updateBotProcessStatus() {
                try {
                    const res = await fetch(`/${id}/bot_status`);
                    const data = await res.json();
                    botIsRunning = data.running;
                    
                    const statusText = document.getElementById("bot-process-status");
                    const btn = document.getElementById("bot-control-btn");
                    
                    if (botIsRunning) {
                        statusText.innerText = "Aktiv (laeuft)";
                        statusText.style.color = "var(--success)";
                        btn.innerText = "Bot stoppen";
                        btn.style.backgroundColor = "var(--danger)";
                    } else {
                        statusText.innerText = "Inaktiv";
                        statusText.style.color = "var(--danger)";
                        btn.innerText = "Bot starten";
                        btn.style.backgroundColor = "var(--accent)";
                    }
                } catch (err) {
                    console.error("Fehler beim Abrufen des Bot-Status:", err);
                }
            }

            async function toggleBotProcess() {
                const btn = document.getElementById("bot-control-btn");
                const originalText = btn.innerText;
                btn.disabled = true;
                btn.innerText = "Bitte warten...";
                
                const action = botIsRunning ? "stop_bot" : "start_bot";
                try {
                    const res = await fetch(`/${id}/${action}`, { method: "POST" });
                    if (res.ok) {
                        await updateBotProcessStatus();
                        updateBotLog();
                    } else {
                        const data = await res.json();
                        alert("Aktion fehlgeschlagen: " + (data.message || "Unbekannter Fehler"));
                    }
                } catch (err) {
                    console.error("Fehler bei Bot-Steuerung:", err);
                } finally {
                    btn.disabled = false;
                }
            }

            async function updateBotLog() {
                try {
                    const res = await fetch(`/${id}/bot_log`);
                    const data = await res.json();
                    const consoleLog = document.getElementById("bot-console-log");
                    
                    // Keep scroll at bottom if user hasn't scrolled up
                    const atBottom = consoleLog.scrollHeight - consoleLog.clientHeight <= consoleLog.scrollTop + 20;
                    consoleLog.value = data.log || "";
                    if (atBottom) {
                        consoleLog.scrollTop = consoleLog.scrollHeight;
                    }
                } catch (err) {
                    console.error("Fehler beim Laden der Logs:", err);
                }
            }

            // Periodic polling for status and logs
            updateBotProcessStatus();
            updateBotLog();
            setInterval(updateBotProcessStatus, 3000);
            setInterval(updateBotLog, 3000);
        </script>
        {% endif %}
    </div>
</body>
</html>
